<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
.wrap { position: fixed; inset: 0; opacity: 0; }
.wrap video, .wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
.wrap img { display: none; }
</style>
</head>
<body>
<div id="no-display-notice" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:white; font-family:-apple-system,sans-serif; text-align:center; font-size:20px; line-height:1.8; z-index:999;">
  ⚠️ No external display detected<br/>
  <span style="font-size:15px; opacity:0.6;">Move this window to your projector or LED wall screen</span>
</div>
<div id="wrap-a" class="wrap" style="z-index:1">
  <video id="vid-a" playsinline></video>
  <img id="img-a" alt=""/>
</div>
<div id="wrap-b" class="wrap" style="z-index:1">
  <video id="vid-b" playsinline></video>
  <img id="img-b" alt=""/>
</div>
<script>
const wrapA = document.getElementById('wrap-a')
const wrapB = document.getElementById('wrap-b')
const vidA  = document.getElementById('vid-a')
const vidB  = document.getElementById('vid-b')
const imgA  = document.getElementById('img-a')
const imgB  = document.getElementById('img-b')
let active  = 'a'

function getActive()   { return active === 'a' ? { wrap: wrapA, vid: vidA, img: imgA } : { wrap: wrapB, vid: vidB, img: imgB } }
function getInactive() { return active === 'a' ? { wrap: wrapB, vid: vidB, img: imgB } : { wrap: wrapA, vid: vidA, img: imgA } }

// A wrap can hold either a looping video or a held still. Flip between them.
function setVideoMode(w) { const v = w.querySelector('video'), i = w.querySelector('img'); i.style.display = 'none'; i.removeAttribute('src'); v.style.display = '' }
function setStillMode(w) { const v = w.querySelector('video'), i = w.querySelector('img'); v.pause(); v.ontimeupdate = null; v.removeAttribute('src'); v.style.display = 'none'; i.style.display = '' }

function fadeWrap(el, toOpacity, durationSec) {
  if (el._fadeTimer) { clearInterval(el._fadeTimer); el._fadeTimer = null }
  const from = parseFloat(el.style.opacity) || 0
  if (durationSec <= 0) { el.style.opacity = String(toOpacity); return }
  const durationMs = durationSec * 1000
  const t0 = Date.now()
  el._fadeTimer = setInterval(() => {
    const p = Math.min((Date.now() - t0) / durationMs, 1)
    el.style.opacity = String(from + (toOpacity - from) * p)
    if (p >= 1) { clearInterval(el._fadeTimer); el._fadeTimer = null }
  }, 16)
}

function makeFilter(b, c, h, s) {
  return `brightness(${b ?? 100}%) contrast(${c ?? 100}%) hue-rotate(${h ?? 0}deg) saturate(${s ?? 100}%)`
}

function crossfadeTo(src, dissolve, looping, colorSettings) {
  const { wrap: inWrap, vid: inVid } = getInactive()
  const { wrap: outWrap, vid: outVid } = getActive()
  setVideoMode(inWrap)  // in case this wrap was previously showing a still
  // Apply color to incoming wrap immediately — outWrap keeps its own filter throughout
  if (looping) {
    // Loop dissolve — always inherit whatever filter is currently on the active wrap,
    // including any live slider adjustments made after the scene started playing
    inWrap.style.filter = outWrap.style.filter
  } else if (colorSettings) {
    inWrap.style.filter = makeFilter(colorSettings.brightness, colorSettings.contrast, colorSettings.hue, colorSettings.saturation)
  } else {
    inWrap.style.filter = ''
  }

  outVid.ontimeupdate = null
  inWrap.style.zIndex  = '2'
  outWrap.style.zIndex = '1'
  inVid.src  = src
  inVid.loop = false

  function startFade() {
    inVid.play().catch(e => console.warn('play error:', e))
    active = active === 'a' ? 'b' : 'a'
    // Wait for first real decoded frame before switching — prevents black flash
    const doSwitch = () => {
      inVid.ontimeupdate = null
      if (dissolve <= 0.1) {
        inWrap.style.opacity = '1'
        outWrap.style.opacity = '0'
      } else {
        fadeWrap(inWrap, 1, dissolve)
      }
      setTimeout(() => {
        outWrap.style.zIndex = '1'
        outWrap.style.opacity = '0'
        outVid.pause()
        outVid.srcObject = null
        outVid.src = ''
      }, dissolve * 1000)
      if (looping) scheduleLoopDissolve(inVid, src, dissolve)
    }
    inVid.ontimeupdate = doSwitch
  }

  if (outVid.readyState === 0) {
    // First play — outVid is idle. Load the same src into it and wait until
    // BOTH videos are ready/playing before starting the fade. Two simultaneous
    // H.264 streams compete for the hardware overlay slot, which forces both
    // through CSS compositing so opacity works correctly on the very first cue.
    let inReady = false, outPlaying = false
    const tryStart = () => { if (inReady && outPlaying) startFade() }

    inVid.onloadeddata = () => { inReady = true; tryStart() }

    const onOutPlaying = () => {
      outVid.removeEventListener('playing', onOutPlaying)
      outPlaying = true
      tryStart()
    }
    outVid.addEventListener('playing', onOutPlaying)
    outVid.src = src
    outVid.muted = true
    outVid.play().catch(() => { outPlaying = true; tryStart() })
  } else {
    inVid.onloadeddata = startFade
  }
}

function scheduleLoopDissolve(vid, src, dissolve) {
  let fired = false

  const doLoop = (d) => {
    if (fired) return
    fired = true
    vid.ontimeupdate = null
    vid.onended = null
    crossfadeTo(src, d, true)
  }

  // Foreground: smooth dissolve triggered before video ends
  vid.ontimeupdate = () => {
    if (fired || !vid.duration) return
    const remaining = vid.duration - vid.currentTime
    if (remaining <= dissolve && remaining > 0) doLoop(dissolve)
  }

  // Background fallback: if timeupdate stops firing, restart on ended
  vid.onended = () => doLoop(0.5)
}

// Crossfade to a still image — same opacity blend, but it HOLDS (no loop, no timer).
function crossfadeToStill(src, dissolve, colorSettings) {
  const { wrap: inWrap, img: inImg } = getInactive()
  const { wrap: outWrap } = getActive()
  inWrap.style.filter = colorSettings
    ? makeFilter(colorSettings.brightness, colorSettings.contrast, colorSettings.hue, colorSettings.saturation)
    : ''
  setStillMode(inWrap)
  inWrap.style.zIndex = '2'
  outWrap.style.zIndex = '1'
  const start = () => {
    active = active === 'a' ? 'b' : 'a'
    if (dissolve <= 0.1) { inWrap.style.opacity = '1'; outWrap.style.opacity = '0' }
    else fadeWrap(inWrap, 1, dissolve)
    setTimeout(() => {
      outWrap.style.opacity = '0'
      outWrap.style.zIndex = '1'
      const ov = outWrap.querySelector('video')
      if (ov) { ov.pause(); ov.srcObject = null; ov.removeAttribute('src') }
    }, dissolve * 1000)
  }
  inImg.onload = start
  inImg.onerror = start   // still reveal the wrap even if the image hiccups
  inImg.src = src
}

// No external display notice
window.showrunner.onNoExternalDisplay(() => {
  document.getElementById('no-display-notice').style.display = 'block'
})

// Main-process heartbeat — resumes video if macOS suspended it
window.showrunner.onKeepAlive(() => {
  [vidA, vidB].forEach(v => {
    if (v.src && v.paused && !v.ended) {
      v.play().catch(e => console.warn('keep-alive resume:', e))
    }
  })
})

window.showrunner.onLedCommand(({ type, src, dissolve, loop, brightness, contrast, hue, saturation, enabled }) => {
  const d = dissolve || 1
  if (type === 'play') {
    const colorSettings = (brightness != null || contrast != null || hue != null || saturation != null)
      ? { brightness, contrast, hue, saturation } : null
    crossfadeTo(src, d, loop || false, colorSettings)
  }
  if (type === 'still') {
    const colorSettings = (brightness != null || contrast != null || hue != null || saturation != null)
      ? { brightness, contrast, hue, saturation } : null
    crossfadeToStill(src, d, colorSettings)
  }
  if (type === 'black') {
    vidA.ontimeupdate = null
    vidB.ontimeupdate = null
    fadeWrap(wrapA, 0, d)
    fadeWrap(wrapB, 0, d)
  }
  if (type === 'color') {
    // Live slider update — apply to whichever wrap is currently active
    const { wrap: activeWrap } = getActive()
    activeWrap.style.filter = makeFilter(brightness, contrast, hue, saturation)
  }
if (type === 'rear-projection') {
    document.body.style.transform = enabled ? 'scaleX(-1)' : ''
  }
})
</script>
</body>
</html>
